<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piadas do Chuck Norris</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
    }

    .container {
      background: #ffffff10;
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 15px;
      max-width: 500px;
      width: 90%;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 20px;
      font-size: 1.8rem;
    }

    #joke {
      font-size: 1.2rem;
      margin-bottom: 25px;
      min-height: 80px;
    }

    button {
      background: #ffcc00;
      border: none;
      padding: 12px 20px;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #e6b800;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.5rem;
      }

      #joke {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>😂 Piadas do Chuck Norris</h1>
    <p id="joke">Clique no botão para ver uma piada...</p>
    <button onclick="getJoke()">Nova Piada</button>
  </div>

  <script>
    async function getJoke() {
      const jokeElement = document.getElementById("joke");
      jokeElement.textContent = "Carregando...";

      try {
        const response = await fetch("https://api.chucknorris.io");
        const data = await response.json();
        jokeElement.textContent = data.value;
      } catch (error) {
        jokeElement.textContent = "Erro ao carregar a piada. Tente novamente.";
      }
    }
  </script>

</body>
</html>
