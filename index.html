<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piadas do Chuck Norris</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main class="page">
    <section class="container" aria-labelledby="title">
      <h1 id="title">😂 Piadas do Chuck Norris</h1>
      <p id="joke" class="joke" role="status" aria-live="polite">Clique no botão para ver uma piada...</p>
      <div class="controls">
        <label for="categorySelect" class="sr-only">Categoria</label>
        <select id="categorySelect" class="select">
          <option value="">Aleatória</option>
        </select>
        <button id="jokeBtn" class="btn primary">Nova Piada</button>
      </div>
    </section>
  </main>

  <script src="script.js" defer></script>

</body>
</html>
